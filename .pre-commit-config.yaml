repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^agents/.+/manifest\.yaml$'  # manifest проверяется portal-sdk
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: '^(apps|packages)/.+\.py$'

  - repo: local
    hooks:
      - id: validate-manifests
        name: Validate agent manifests
        entry: bash -c 'for d in agents/*/; do [ -f "$d/manifest.yaml" ] && python packages/portal-sdk-python/portal_sdk/validate_manifest.py "$d" || true; done'
        language: system
        pass_filenames: false
        files: '^agents/.+manifest\.yaml$'
