# Production override для docker-compose. Использовать:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d
#
# Что меняется vs dev:
# - restart: unless-stopped для всех сервисов (auto-recovery)
# - postgres-порт не публикуется наружу
# - api/frontend биндятся на 127.0.0.1 (наружу — через nginx :443)
# - frontend NEXT_PUBLIC_WS_URL = wss://<домен> (set в .env через PUBLIC_DOMAIN)
# - COOKIE_SECURE=true (требует TLS)
# - ENVIRONMENT=prod
# - file_store — bind mount /var/portal-files (как dev, разделяется с worker)
services:
  postgres:
    restart: unless-stopped
    ports: []
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /var/backups/portal:/var/backups/portal:rw

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    # !reset убирает порт из base compose (там '8000:8000' на 0.0.0.0).
    # В prod 0.0.0.0:8000 уже занят nginx — биндим на 127.0.0.1:8001
    # и проксируем через nginx.
    ports: !override
      - "127.0.0.1:8001:8000"
    environment:
      ENVIRONMENT: prod
      COOKIE_SECURE: "true"
      ALLOWED_ORIGINS: '["https://${PUBLIC_DOMAIN}"]'

  worker:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: wss://${PUBLIC_DOMAIN}
      NODE_ENV: production
