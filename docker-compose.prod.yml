# Production override для docker-compose. Использовать:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Что меняется vs dev:
# - restart: unless-stopped для всех сервисов (auto-recovery)
# - убраны bind mounts для api/portal-sdk (используется код из image)
# - убрана публикация postgres-port наружу
# - frontend NEXT_PUBLIC_WS_URL = wss://<домен> (нужно set'нуть в .env)
# - COOKIE_SECURE=true (требует TLS)
# - ENVIRONMENT=prod
services:
  postgres:
    restart: unless-stopped
    ports: []
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /var/backups/portal:/var/backups/portal:rw

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      ENVIRONMENT: prod
      COOKIE_SECURE: "true"
      ALLOWED_ORIGINS: '["https://${PUBLIC_DOMAIN}"]'
    volumes:
      - portal_files:/var/portal-files

  worker:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_WS_URL: wss://${PUBLIC_DOMAIN}
      NODE_ENV: production
