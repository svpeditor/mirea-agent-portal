id: echo
name: "Echo (диагностика портала)"
version: "0.1.0"
category: "научная-работа"
icon: "🔁"
short_description: |
  Тестовый агент. Принимает текст, возвращает Word с этим же
  текстом и небольшой сводкой. Нужен для проверки портала.

inputs:
  message:
    type: text
    label: "Сообщение"
    placeholder: "что повторить"
    required: true
  loops:
    type: number
    label: "Сколько раз повторить"
    default: 5
    min: 1
    max: 100
  shout:
    type: checkbox
    label: "В верхнем регистре"
    default: false

files: {}

outputs:
  - id: report
    type: docx
    label: "Echo Word"
    filename: "echo.docx"
    primary: true
  - id: summary
    type: json
    label: "Параметры запуска"
    filename: "summary.json"

runtime:
  docker:
    base_image: "python:3.12-slim"
    setup:
      - "pip install -r requirements.txt"
    entrypoint: ["python", "agent.py"]
  llm:
    provider: openrouter
    models: []
  limits:
    max_runtime_minutes: 2
    max_memory_mb: 256
    max_cpu_cores: 1
