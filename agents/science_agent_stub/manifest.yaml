id: science-agent
name: "Поиск научных статей"
version: "0.1.0"
category: "научная-работа"
icon: "🔬"
short_description: |
  По теме исследования собирает релевантные статьи (arXiv / Semantic Scholar /
  Crossref), ранжирует через LLM, формирует Word-отчёт с аннотациями.

inputs:
  topic:
    type: textarea
    label: "Тема исследования"
    placeholder: "например, machine learning для медицинской диагностики"
    rows: 4
    required: true
  max_papers:
    type: number
    label: "Сколько статей"
    default: 30
    min: 5
    max: 100
  language:
    type: radio
    label: "Язык запроса"
    options:
      - { value: "ru", label: "Русский" }
      - { value: "en", label: "Английский" }
    default: "en"

files: {}

outputs:
  - id: report
    type: docx
    label: "Отчёт по теме"
    filename: "report.docx"
    primary: true
  - id: bibtex
    type: any
    label: "BibTeX источников"
    filename: "sources.bib"

runtime:
  docker:
    base_image: "python:3.12-slim"
    setup:
      - "pip install -r requirements.txt"
    entrypoint: ["python", "agent.py"]
  limits:
    max_runtime_minutes: 30
    max_memory_mb: 512
    max_cpu_cores: 1
  llm:
    provider: openrouter
    models:
      - "deepseek/deepseek-r1"
      - "anthropic/claude-haiku-4-5-20251001"
