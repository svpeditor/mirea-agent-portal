id: school-works-expert
name: "Эксперт конкурсных работ школьников"
version: "1.0.0"
category: "научная-работа"
icon: "🎓"
short_description: |
  Анализирует работы школьников по чек-листу
  и выдаёт экспертное заключение в Word.

inputs:
  section:
    type: text
    label: "Секция конкурса"
    placeholder: "например: робототехника"
    default: "общая"
    required: true
  strict_mode:
    type: checkbox
    label: "Жёсткий режим"
    help: "Снижает балл за каждый недостаток"
    default: false

files:
  works_folder:
    type: folder
    label: "Папка с работами"
    help: "В каждой подпапке — текст работы и презентация"
    accept: [".docx", ".pdf", ".pptx"]
    max_total_size_mb: 500
    required: true

outputs:
  - id: report
    type: docx
    label: "Экспертное заключение"
    filename: "экспертное_заключение.docx"
    primary: true
  - id: summary
    type: json
    label: "Структурированный результат"
    filename: "summary.json"

runtime:
  docker:
    base_image: "python:3.12-slim"
    setup:
      - "pip install -r requirements.txt"
    entrypoint: ["python", "agent.py"]
  llm:
    provider: openrouter
    models: ["deepseek/deepseek-chat"]
  limits:
    max_runtime_minutes: 60
    max_memory_mb: 1024
    max_cpu_cores: 2
