id: dummy-test
name: "Dummy для тестов local_runner"
version: "0.0.1"
category: "научная-работа"
short_description: "Используется только в pytest"

inputs:
  message:
    type: text
    label: "Сообщение"
    default: "hello"
    required: true

files: {}

outputs:
  - id: echoed
    type: any
    label: "Эхо"
    filename: "echoed.txt"
    primary: true

runtime:
  docker:
    base_image: "python:3.12-slim"
    setup: ["pip install -r requirements.txt"]
    entrypoint: ["python", "agent.py"]
